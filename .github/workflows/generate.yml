name: Generate calendar

on:
  schedule:
    - cron: "0 0 20-28 3,6,9,12 *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate ICS
        run: npm run generate

      - name: Commit updated calendar
        run: |
          if git diff --quiet -- dist/plate-5.ics; then
            echo "No calendar changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/plate-5.ics
          git commit -m "Update Beijing plate restriction calendar"
          git push
